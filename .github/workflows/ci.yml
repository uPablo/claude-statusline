name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: --severity=warning --shell=bash
        with:
          scandir: '.'

  psscriptanalyzer:
    name: PSScriptAnalyzer (powershell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path ./windows -Recurse -Settings ./.github/PSScriptAnalyzerSettings.psd1
          if ($issues) {
            $issues | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer found $($issues.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: clean."
